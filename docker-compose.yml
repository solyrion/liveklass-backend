services:
  mysql:
    image: mysql:8.0
    container_name: liveklass-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: liveklass
      MYSQL_USER: liveklass
      MYSQL_PASSWORD: liveklass1234
    volumes:
      - mysql-data:/var/lib/mysql

  mysql-test:
    image: mysql:8.0
    container_name: liveklass-mysql-test
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: liveklass_test
      MYSQL_USER: liveklass
      MYSQL_PASSWORD: liveklass1234
    volumes:
      - mysql-test-data:/var/lib/mysql

volumes:
  mysql-data:
  mysql-test-data:
